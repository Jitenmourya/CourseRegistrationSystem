<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="container mt-4">
      <a href="dashboard.html">← Back to Dashboard</a>
      <h3 class="mt-2">Students</h3>

      <div class="card p-3 mt-3">
        <div class="d-flex justify-content-between mb-3">
          <input class="form-control search-box" placeholder="Search by name..." oninput="filterStudents(this.value)" />
        </div>
        <div class="table-responsive">
          <table class="table table-striped">
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Department</th><th>Actions</th></tr></thead>
            <tbody id="studentsTbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      function filterStudents(q) {
        const rows = document.querySelectorAll('#studentsTbody tr');
        rows.forEach(r=>{ r.style.display = q? (r.textContent.toLowerCase().includes(q.toLowerCase())? '' : 'none') : ''; });
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
