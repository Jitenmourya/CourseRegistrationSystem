<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="container mt-4">
      <a href="dashboard.html">← Back to Dashboard</a>
      <h3 class="mt-2">Add Student</h3>
      <div class="card p-3 mt-3">
        <form id="addStudentForm">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input id="s_name" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="s_email" type="email" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Department</label>
            <input id="s_dept" class="form-control" required />
          </div>
          <div class="d-grid"><button class="btn btn-primary">Save Student</button></div>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
